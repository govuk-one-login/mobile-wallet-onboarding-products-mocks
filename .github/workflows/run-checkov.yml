name: Run Checkov Static Analysis
on:
  workflow_call:
    inputs:
      file-to-scan:
        required: true
        type: string

jobs:
  run-checkov:
    name: Run Checkov
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@b75da993a1a8b73d1086c8d330cadeee5bcccb31 # v12.3103.0
        with:
          file: ${{ inputs.file-to-scan }}
          quiet: true
          soft_fail: false
