name: Run Checkov Static Analysis
on:
  workflow_call:
    inputs:
      file-to-scan:
        required: true
        type: string

jobs:
  run-checkov:
    name: Run Checkov
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@dfb51aed1b783289b0d3f255028e7a88d5e8caa1 # v12.3105.0
        with:
          file: ${{ inputs.file-to-scan }}
          quiet: true
          soft_fail: false
