name: STS Mock - Push to Main

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - sts-mock/**
      - .github/workflows/sts-mock-push-to-main.yml

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-sam-template-formatting:
    name: Check SAM template formatting
    uses: ./.github/workflows/check-sam-template-formatting.yml
    with:
      working-directory: ./sts-mock

  validate-docker-image:
    name: Validate Docker image
    uses: ./.github/workflows/validate-docker-image.yml
    with:
      working-directory: ./sts-mock

  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [validate-docker-image]
    permissions:
      id-token: write
      contents: read
    env:
      SAM_CLI_TELEMETRY: 0
    defaults:
      run:
        working-directory: ./sts-mock
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.BUILD_STS_MOCK_GH_ACTIONS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: 'v3.0.5'

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.BUILD_STS_MOCK_ECR_REPOSITORY_NAME }}
          CONTAINER_SIGN_KMS_KEY: ${{ secrets.BUILD_STS_MOCK_CONTAINER_SIGNER_KMS_KEY_ARN }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cosign sign --key awskms:///${CONTAINER_SIGN_KMS_KEY} $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133 # v2
        with:
          version: 1.155.2
          use-installer: true

      - name: Update SAM template with ECR image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.BUILD_STS_MOCK_ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: sed -i "s|CONTAINER-IMAGE-PLACEHOLDER|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|" template.yaml

      - name: Validate SAM template
        run: sam validate --lint

      - name: Build SAM template
        run: sam build

      - name: Deploy SAM app
        uses: govuk-one-login/devplatform-upload-action@b7bc01ed6e0b61d54f42e7f3d12dd3fdbb0f172a # v3.13.0
        with:
          artifact-bucket-name: ${{ secrets.BUILD_STS_MOCK_GH_ARTIFACT_SOURCE_BUCKET_NAME }}
          working-directory: ./sts-mock
          template-file: .aws-sam/build/template.yaml
